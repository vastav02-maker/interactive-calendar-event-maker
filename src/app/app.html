<div class="container">

  <h1>Event Calendar</h1>

  <form [formGroup]="eventForm" (ngSubmit)="addOrUpdateEvent()">

    <input
      type="text"
      placeholder="Enter Event Title"
      formControlName="title"
    >

    <br><br>

    <input
      type="date"
      formControlName="date"
    >

    <br><br>

    <button type="submit">

      {{ editIndex === null ? 'Add Event' : 'Update Event' }}

    </button>

  </form>

  <br>

  <div class="event-card" *ngFor="let event of events; let i = index">

    <h3>{{ event.title }}</h3>

    <p>Date: {{ event.date }}</p>

    <button (click)="editEvent(i)">
      Edit
    </button>

    <button (click)="deleteEvent(i)">
      Delete
    </button>

  </div>

</div>
